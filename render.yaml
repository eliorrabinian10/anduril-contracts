services:
  # Backend + Frontend (served together)
  - type: web
    name: anduril-contracts
    runtime: node
    region: oregon
    plan: free
    buildCommand: cd frontend && npm install && npm run build && cd ../backend && npm install
    startCommand: cd backend && NODE_ENV=production npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: NODE_VERSION
        value: 18.18.0
      - key: REACT_APP_API_URL
        value: /api
    healthCheckPath: /api/health
